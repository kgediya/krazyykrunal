<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Krazyy Secret Santa</title>
    <meta name="description" content="A festive Secret Santa reveal experience.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@500;700;800&family=Mountains+of+Christmas:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r102/three.min.js"></script>
    <script defer src="https://unpkg.com/three@0.102.0/examples/js/loaders/GLTFLoader.js"></script>
    <script defer src="https://unpkg.com/three@0.102.0/examples/js/loaders/DRACOLoader.js"></script>
    <script defer src="https://unpkg.com/three@0.102.0/examples/js/loaders/FontLoader.js"></script>
    <script defer src="https://unpkg.com/three@0.102.0/examples/js/geometries/TextGeometry.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <script type="module" src="./app.js"></script>
</head>
<body>
    <main class="app-shell">
        <div class="background-layer" aria-hidden="true"></div>
        <div class="scene-aura scene-aura-left" aria-hidden="true"></div>
        <div class="scene-aura scene-aura-right" aria-hidden="true"></div>
        <div id="WebGL-output" class="scene-layer" aria-hidden="true"></div>

        <section class="ui-layer" id="container" aria-live="polite">
            <header class="portal-hero">
                <img src="./texture.png" class="logo-image" id="overlay_text" alt="Secret Santa">
                <p id="greeting_text" class="greeting-text">Merry Christmas</p>
                <p id="status_text" class="status-text" data-state="loading">Loading holiday magic...</p>
            </header>

            <button type="button" class="reveal-button" id="reveal_btn" disabled>
                <img src="./button.png" alt="Reveal your Secret Santa giftee">
            </button>
        </section>
    </main>

    <noscript>
        <div class="no-script">This Secret Santa reveal needs JavaScript enabled.</div>
    </noscript>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynalinks | Krazyy Krunal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Add Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
  :root {
    --bg: #050505;
    --panel: rgba(18, 18, 18, 0.84);
    --line: rgba(255, 255, 255, 0.18);
    --line-strong: rgba(255, 255, 255, 0.52);
    --text: #f5f5f5;
    --muted: rgba(245, 245, 245, 0.72);
    --shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    background:
      radial-gradient(circle at 12% 10%, rgba(255,255,255,0.08), transparent 24%),
      radial-gradient(circle at 88% 20%, rgba(255,255,255,0.07), transparent 26%),
      linear-gradient(170deg, #010101 0%, #0a0a0a 100%);
    padding: 22px 14px 34px;
    display: grid;
    place-items: center;
  }

  .tool-shell {
    width: min(1040px, 100%);
    display: grid;
    gap: 14px;
  }

  .tool-topbar,
  .card {
    border: 1px solid var(--line);
    background: var(--panel);
    border-radius: 20px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(8px);
  }

  .tool-topbar {
    padding: 16px 18px;
  }

  .tool-topbar h1 {
    margin: 0;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.08em;
    font-size: clamp(1.1rem, 2.8vw, 1.6rem);
    text-transform: uppercase;
  }

  .tool-topbar p {
    margin: 10px 0 0;
    color: var(--muted);
    line-height: 1.55;
    font-size: .95rem;
  }

  .card {
    padding: 20px;
  }

  h2 {
    margin: 0;
    text-align: center;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 1rem;
    color: var(--muted);
  }

  .button-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .button,
  .sign-out-button,
  .delete-button,
  .edit-button,
  .qr-button {
    font-family: inherit;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    color: #fff;
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    font-weight: 700;
    transition: transform .18s ease, background .18s ease;
  }

  .button,
  .sign-out-button { padding: 10px 16px; }

  .delete-button,
  .edit-button,
  .qr-button {
    padding: 7px 12px;
    margin-right: 5px;
    margin-bottom: 8px;
  }

  .delete-button { color: #ff8c8c; }

  .button:hover,
  .sign-out-button:hover,
  .delete-button:hover,
  .edit-button:hover,
  .qr-button:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.16);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 14px;
    border-radius: 14px;
    overflow: hidden;
  }

  th,
  td {
    border: 1px solid var(--line);
    padding: 10px;
    text-align: left;
    vertical-align: top;
    color: var(--text);
    background: rgba(255,255,255,0.02);
  }

  th {
    letter-spacing: .07em;
    text-transform: uppercase;
    font-size: .78rem;
    color: var(--muted);
    background: rgba(255,255,255,0.07);
  }

  a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px dashed rgba(255,255,255,0.45);
    word-break: break-all;
  }

  a:hover { border-bottom-color: #fff; }

  @media (max-width: 700px) {
    .card { padding: 14px; }
    table { font-size: 11px; }
    th, td { padding: 8px; }
  }
</style>
</head>
<body>
  <main class="tool-shell">
    <header class="tool-topbar">
      <h1>Dynalinks</h1>
      <p>Create, manage, and edit short links with a cleaner operator workflow and faster access to actions.</p>
    </header>
    <div class="card">
        <h2>Dynalinks</h2>
        <table hidden>
          <thead>
            <tr>
              <th>Fixed URL</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="linkList"></tbody>
        </table>
        <div class="button-container">
          <button id="signInButton" class="button">Sign In with Google</button>
          <button id="signOutButton" class="sign-out-button" hidden>Sign Out</button>
          <button id="createLinkButton" class="button" hidden>Create Link</button>
        </div>
      </div>
    </main>
  <script type="module" src="script.js"></script>
</body>
</html>
